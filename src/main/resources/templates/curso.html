<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <script th:src="@{/js/bootstrap.bundle.min.js}" type="text/javascript"></script>
    <title th:text="${@environment.getProperty('aplicacion.nombre')}">Mantenimiento de Cursos</title>
</head>
<body>
<div class="my-4">
    <h1 class="text-center mb-4">Mantenimiento de Cursos</h1>
    <div class="table-responsive mb-4">
        <table class="table table-sm table-light table-striped table-bordered table-hover align-middle">
            <thead class="table-success">
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Fecha Inicio</th>
                <th>Mínimo alumnos</th>
                <th>Inscritos</th>
                <th>Estado</th>
                <th>Eliminar</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="curso : ${lista}">
                <td th:text="${curso.idCurso}"></td>
                <td th:text="${curso.nomCurso}"></td>
                <td th:text="${curso.fechaInicio}"></td>
                <td th:text="${curso.alumnosMin}"></td>
                <td th:text="${curso.alumnosAct}"></td>
                <td th:text="${curso.estado}"></td>
                <td>
                    <a th:href="@{/cursoEliminar(codigo=${curso.idCurso})}"
                       class="btn btn-danger btn-sm">SI</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <hr/>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-3">Datos del curso a ingresar</h2>
            <form th:action="@{/cursoGrabar}" method="post">
                <div class="mb-3">
                    <label for="nomCurso" class="form-label">Nombre Curso</label>
                    <input type="text" id="nomCurso" name="nomCurso" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label for="fechaInicio" class="form-label">Fecha Inicio</label>
                    <input type="date" id="fechaInicio" name="fechaInicio" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label for="alumnosMin" class="form-label">Mínimo Alumnos</label>
                    <input type="number" id="alumnosMin" name="alumnosMin" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label for="estado" class="form-label">Estado</label>
                    <select id="estado" name="estado" class="form-control" required>
                        <option value="0">CREADO</option>
                        <option value="1">EN PROCESO DE VENTA</option>
                        <option value="2">COMPLETO</option>
                    </select>
                </div>
                <div class="d-flex justify-content-between">
                    <input type="submit" value="Grabar" class="btn btn-primary"/>
                    <a th:href="@{/cursoListar}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
